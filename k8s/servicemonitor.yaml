apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: smarthouse-controller
  namespace: smarthouse
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: smarthouse-controller
  endpoints:
    - port: "24867"
      path: /smarthouse/actuator/prometheus
      interval: 15s
  namespaceSelector:
    matchNames:
      - smarthouse
