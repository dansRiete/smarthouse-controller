---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-exporter-queries
  namespace: smarthouse
data:
  queries.yaml: |
    pg_slow_queries:
      query: |
        SELECT
          queryid::text AS queryid,
          regexp_replace(left(query, 500), E'[\\n\\r\\t ]+', ' ', 'g') AS query_short,
          calls,
          round(total_exec_time::numeric, 1)  AS total_exec_time_ms,
          round(mean_exec_time::numeric, 1)   AS mean_exec_time_ms,
          rows,
          shared_blks_read  AS blks_from_disk,
          shared_blks_hit   AS blks_from_cache
        FROM pg_stat_statements
        WHERE dbid = (SELECT oid FROM pg_database WHERE datname = current_database())
        ORDER BY total_exec_time DESC
        LIMIT 20
      metrics:
        - queryid:
            usage: "LABEL"
            description: "Query ID (hash)"
        - query_short:
            usage: "LABEL"
            description: "Query text, first 500 chars"
        - calls:
            usage: "GAUGE"
            description: "Total executions since last reset"
        - total_exec_time_ms:
            usage: "GAUGE"
            description: "Cumulative execution time (ms)"
        - mean_exec_time_ms:
            usage: "GAUGE"
            description: "Mean execution time (ms)"
        - rows:
            usage: "GAUGE"
            description: "Total rows returned"
        - blks_from_disk:
            usage: "GAUGE"
            description: "Shared blocks read from disk"
        - blks_from_cache:
            usage: "GAUGE"
            description: "Shared blocks served from cache"

    pg_table_size:
      query: |
        SELECT
          schemaname,
          relname AS table_name,
          pg_total_relation_size(schemaname||'.'||relname)                                          AS total_bytes,
          pg_relation_size(schemaname||'.'||relname)                                                AS table_bytes,
          pg_total_relation_size(schemaname||'.'||relname) - pg_relation_size(schemaname||'.'||relname) AS index_bytes
        FROM pg_stat_user_tables
        WHERE schemaname = 'main'
        ORDER BY total_bytes DESC
      metrics:
        - schemaname:
            usage: "LABEL"
            description: "Schema name"
        - table_name:
            usage: "LABEL"
            description: "Table name"
        - total_bytes:
            usage: "GAUGE"
            description: "Total size including indexes (bytes)"
        - table_bytes:
            usage: "GAUGE"
            description: "Table data size (bytes)"
        - index_bytes:
            usage: "GAUGE"
            description: "Index size (bytes)"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: smarthouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          ports:
            - containerPort: 9187
          env:
            - name: DATA_SOURCE_USER
              value: smarthouse
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: smarthouse-secret
                  key: SPRING_DATASOURCE_PASSWORD
            - name: DATA_SOURCE_URI
              value: "smarthouse-db:5432/smarthouse?sslmode=disable"
            - name: PG_EXPORTER_EXTEND_QUERY_PATH
              value: /etc/postgres-exporter/queries.yaml
          volumeMounts:
            - name: queries
              mountPath: /etc/postgres-exporter
      volumes:
        - name: queries
          configMap:
            name: postgres-exporter-queries
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: smarthouse
  labels:
    app: postgres-exporter
spec:
  selector:
    app: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-exporter
  namespace: smarthouse
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: postgres-exporter
  endpoints:
    - port: metrics
      interval: 30s
  namespaceSelector:
    matchNames:
      - smarthouse
