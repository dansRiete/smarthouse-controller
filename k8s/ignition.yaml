apiVersion: apps/v1
kind: Deployment
metadata:
  name: ignition
  namespace: smarthouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ignition
  template:
    metadata:
      labels:
        app: ignition
    spec:
      containers:
        - name: ignition
          image: inductiveautomation/ignition:latest
          ports:
            - containerPort: 8088
            - containerPort: 8043
          env:
            - name: ACCEPT_IGNITION_EULA
              value: "Y"
            - name: IGNITION_EDITION
              value: standard
            - name: TZ
              value: America/New_York
          volumeMounts:
            - name: ignition-data
              mountPath: /usr/local/bin/ignition/data
      volumes:
        - name: ignition-data
          hostPath:
            path: /home/alexkzk/ignition-data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: ignition
  namespace: smarthouse
spec:
  type: NodePort
  selector:
    app: ignition
  ports:
    - name: http
      port: 8088
      targetPort: 8088
      nodePort: 30888
    - name: https
      port: 8043
      targetPort: 8043
      nodePort: 30843
